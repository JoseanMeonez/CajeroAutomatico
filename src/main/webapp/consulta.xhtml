<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/templates/layout.xhtml">
    <ui:define name="titulo">Consulta de Saldo</ui:define>
    <ui:define name="contenido">
        <div class="formulario">
            <h2>Consulta de Saldo</h2>
            <h:form>
                <div class="campo">
                    <h:outputLabel for="cuenta" value="Numero de Cuenta:"/>
                    <h:inputText id="cuenta" value="#{cajeroBean.numeroCuenta}"/>
                    <h:message for="cuenta" styleClass="error"/>
                </div>
                <div class="campo">
                    <h:outputLabel for="pin" value="PIN:"/>
                    <h:inputSecret id="pin" value="#{cajeroBean.pin}"/>
                    <h:message for="pin" styleClass="error"/>
                </div>
                <div class="campo">
                    <h:commandButton value="Consultar" styleClass="btn"/>
                </div>
                <h:messages globalOnly="true" styleClass="mensajes"/>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
</html>
