<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/templates/layout.xhtml">
    <ui:define name="titulo">Deposito</ui:define>
    <ui:define name="contenido">
        <div class="panel-centrado">
            <p:card>
                <f:facet name="title">
                    <div class="panel-titulo">
                        <i class="pi pi-wallet"/>
                        <span>Deposito</span>
                    </div>
                </f:facet>
                <h:form styleClass="formulario">
                    <div class="campo">
                        <p:outputLabel for="cuenta" value="Numero de Cuenta"/>
                        <p:inputText id="cuenta" value="#{cajeroBean.numeroCuenta}" required="true"
                                     requiredMessage="Numero de cuenta es requerido" styleClass="campo-input"/>
                        <p:message for="cuenta"/>
                    </div>
                    <div class="campo">
                        <p:outputLabel for="pin" value="PIN"/>
                        <p:password id="pin" value="#{cajeroBean.pin}" required="true"
                                    requiredMessage="PIN es requerido" feedback="false" styleClass="campo-input"/>
                        <p:message for="pin"/>
                    </div>
                    <div class="campo">
                        <p:outputLabel for="monto" value="Monto a Depositar"/>
                        <p:inputText id="monto" value="#{cajeroBean.monto}" required="true"
                                     requiredMessage="Monto es requerido"
                                     validatorMessage="Monto invalido" styleClass="campo-input">
                            <f:validateDoubleRange minimum="0.01"/>
                        </p:inputText>
                        <p:message for="monto"/>
                    </div>
                    <div class="campo-boton">
                        <p:commandButton value="Depositar" action="#{cajeroBean.realizarDeposito}"
                                         icon="pi pi-check" update="@form" styleClass="btn-accion"/>
                    </div>
                    <p:messages globalOnly="true" showDetail="false" closable="true" styleClass="mensajes-global"/>
                </h:form>
            </p:card>
        </div>
    </ui:define>
</ui:composition>
</html>
